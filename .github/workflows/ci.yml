name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          registry-url: https://registry.npmjs.org
      - run: yarn install --frozen-lockfile
      - run: yarn prettier:check
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test
      - run: yarn build
      - run: yarn test:pack

      # Advisory: report whether any changesets are pending so PR
      # authors see the impact on the next release before merge.
      # `--output` writes a machine-readable summary; `--since` limits
      # the check to changes on this branch only. Not a gate — never
      # fails the build. Run after build so a broken build fails fast.
      - name: Changeset status
        if: github.event_name == 'pull_request'
        run: yarn changeset status --since=origin/${{ github.base_ref }} || true

  example-android:
    runs-on: ubuntu-latest
    env:
      PICO_APP_ID: ci-placeholder-app-id
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: yarn install --frozen-lockfile
      - run: yarn example:prebuild:android
      - run: yarn example:assemble:mobile
      - run: yarn example:assemble:pico
