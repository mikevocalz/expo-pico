name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          registry-url: https://registry.npmjs.org
      - run: yarn install --frozen-lockfile
      - run: yarn prettier:check
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test
      - run: yarn build
      - run: yarn test:pack

      # Phase G doctor self-smoke — verifies the built CLI binary runs
      # against a minimal fixture so a broken CLI can't ship from green
      # CI. The full example-app lint happens locally (see RELEASING.md)
      # since the example uses app.config.ts and doctor does not ship
      # with its own TypeScript transpilation pipeline.
      - name: Doctor self-smoke
        run: |
          mkdir -p /tmp/doctor-smoke
          cat > /tmp/doctor-smoke/app.config.json <<'JSON'
          {
            "expo": {
              "name": "smoke",
              "slug": "smoke",
              "plugins": [[
                "expo-pico-core",
                { "xrMode": "pico-os6", "appType": "vr",
                  "platformService": { "picoAppId": "APP", "picoAppKey": "KEY" } }
              ]]
            }
          }
          JSON
          node packages/expo-pico-core/cli/build/doctor.js \
            --project /tmp/doctor-smoke --fail-on-warning

      # Advisory: report whether any changesets are pending so PR
      # authors see the impact on the next release before merge.
      # Not a gate — never fails the build.
      - name: Changeset status
        if: github.event_name == 'pull_request'
        run: yarn changeset status --since=origin/${{ github.base_ref }} || true

  example-android:
    runs-on: ubuntu-latest
    env:
      PICO_APP_ID: ci-placeholder-app-id
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: yarn install --frozen-lockfile
      - run: yarn example:prebuild:android
      - run: yarn example:assemble:mobile
      - run: yarn example:assemble:pico
