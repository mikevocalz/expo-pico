name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          registry-url: https://registry.npmjs.org
      - run: yarn install --frozen-lockfile
      - run: yarn prettier:check
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test
      - run: yarn build
      - run: yarn test:pack

  example-android:
    runs-on: ubuntu-latest
    env:
      PICO_APP_ID: ci-placeholder-app-id
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: yarn install --frozen-lockfile
      - run: yarn example:prebuild:android
      - run: yarn example:assemble:mobile
      - run: yarn example:assemble:pico
