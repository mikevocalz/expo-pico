name: Stable Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PICO_APP_ID: ci-placeholder-app-id
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          registry-url: https://registry.npmjs.org
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: yarn install --frozen-lockfile
      - run: yarn prettier:check
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test
      - run: yarn build
      - run: yarn test:pack
      - run: yarn example:prebuild:android
      - run: yarn example:assemble:mobile
      - run: yarn example:assemble:pico
      - name: Publish stable
        run: yarn release:stable
