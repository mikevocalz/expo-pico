plugins {
    id 'com.android.library'
    id 'expo-module-gradle-plugin'
}

expoModule {
    canBePublished false
}

android {
    namespace "expo.modules.pico.iap"
    defaultConfig {
        versionCode 1
        versionName "0.1.0"
    }
    lint {
        abortOnError false
    }
    buildFeatures {
        buildConfig true
    }
}

dependencies {
    // PICO IAP SDK — extension seam
    // Uncomment when SDK is available from PICO Maven:
    // implementation "com.pvr:pvr-iap-sdk:2.1.0"
}
