plugins {
    id 'com.android.library'
    id 'expo-module-gradle-plugin'
}

expoModule {
    canBePublished false
}

android {
    namespace "expo.modules.pico.spatial"
    defaultConfig {
        missingDimensionStrategy "device", "pico", "mobile"
        versionCode 1
        versionName "0.1.0"
    }
    lint {
        abortOnError false
    }
    buildFeatures {
        buildConfig true
    }
}

dependencies {
    // Phase L — cross-module Kotlin import of
    // `PicoPlatformSdkDetector` from expo-pico-core. Resolved via
    // Expo Modules autolinking, which generates an
    // `include :expo-pico-core` line in the consuming app's
    // settings.gradle at prebuild time. If your autolinking path
    // uses a different project name, remove this line — sibling
    // Utils.kt still works via its own inline Class.forName probe.
    // See docs/DEVICE-TESTING-REQUIRED.md.
    implementation project(':expo-pico-core')

    // PICO SDK AARs — compile-only so they are never bundled into the
    // published npm package. Consumers must place the AARs under
    // vendor/pico-sdk/ (monorepo) or android/app/libs/ (consumer app).
    // See vendor/pico-sdk/README.md for download instructions.
    compileOnly fileTree(dir: '../../vendor/pico-sdk', include: ['*.aar'])
}
